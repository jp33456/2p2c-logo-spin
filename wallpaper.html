<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2P2C 3D Logo Wallpaper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e2664; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('c'),
      antialias: true,
      alpha: false
    });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x1e2664, 1);
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1e2664);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 5);
    camera.lookAt(0, 0, 0);

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    const amb = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(amb);
    const key = new THREE.DirectionalLight(0xffffff, 1.2);
    key.position.set(4, 4, 5);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0xffd080, 0.5);
    rim.position.set(-4, -2, -3);
    scene.add(rim);

    const pivot = new THREE.Object3D();
    scene.add(pivot);

    const gltfLoader = new THREE.GLTFLoader();
    gltfLoader.load(
      'https://jp33456.github.io/2p2c-logo-spin/2p2c3D.glb',
      (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.5 / maxDim;
        model.scale.setScalar(scale);
        const box2 = new THREE.Box3().setFromObject(model);
        const center2 = box2.getCenter(new THREE.Vector3());
        const min2 = box2.min;
        model.position.set(-center2.x, -min2.y, -center2.z);
        pivot.add(model);
        const box3 = new THREE.Box3().setFromObject(pivot);
        const size3 = box3.getSize(new THREE.Vector3());
        pivot.position.y = -size3.y * 0.5;
      },
      undefined,
      (err) => console.error('GLB load error:', err)
    );

    let rotY = 0;
    let velY = 0.004;
    let dragging = false;
    let lastX = 0;

    function startDrag(x) { dragging = true; lastX = x; }
    function moveDrag(x) {
      if (!dragging) return;
      velY = (x - lastX) * 0.012;
      rotY += velY;
      lastX = x;
    }
    function endDrag() { dragging = false; }

    window.addEventListener('mousedown', e => startDrag(e.clientX));
    window.addEventListener('mousemove', e => moveDrag(e.clientX));
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchstart', e => startDrag(e.touches[0].clientX), {passive:true});
    window.addEventListener('touchmove', e => moveDrag(e.touches[0].clientX), {passive:true});
    window.addEventListener('touchend', endDrag);

    function animate() {
      requestAnimationFrame(animate);
      if (!dragging) {
        velY *= 0.94;
        if (Math.abs(velY) < 0.002) velY += 0.004;
        rotY += velY;
      }
      pivot.rotation.y = rotY;
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
